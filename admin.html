<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <style>
    :root {
      --bg1: #0d1329;
      --bg2: #202a5e;
      --card: rgba(255, 255, 255, 0.1);
      --line: rgba(255, 255, 255, 0.22);
      --text: #edf2ff;
      --muted: #b7c2ea;
      --danger: #ff5f8a;
      --ok: #68d7a2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(1000px 500px at 10% 10%, rgba(104, 215, 162, 0.16), transparent 60%),
        radial-gradient(900px 500px at 90% 90%, rgba(95, 151, 255, 0.2), transparent 62%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(92vw, 480px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 40px rgba(2, 7, 20, 0.35);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 1.6rem;
    }

    p {
      margin: 8px 0;
      color: var(--muted);
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      background: rgba(5, 10, 25, 0.42);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      width: 100%;
      color: #062127;
      background: linear-gradient(180deg, #7dedbb, #42ce97);
    }

    .danger {
      color: white;
      background: linear-gradient(180deg, #ff7da3, #ff4f82);
      width: 100%;
    }

    .status {
      min-height: 22px;
      margin-top: 10px;
      font-size: 0.92rem;
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }

    .hidden { display: none; }

    .actions {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .history-wrap {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(2, 8, 20, 0.35);
      overflow: hidden;
    }

    .history-title {
      margin: 0;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
      color: #e8edff;
    }

    .history-list {
      max-height: 260px;
      overflow-y: auto;
      padding: 8px;
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.04);
    }

    .history-item strong {
      color: #edf2ff;
      display: block;
      margin-bottom: 3px;
      font-size: 0.9rem;
    }

    .history-item span {
      color: #b7c2ea;
      display: block;
      font-size: 0.82rem;
      line-height: 1.35;
    }

    .small-link {
      color: #d2dbff;
      text-align: center;
      display: block;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <section class="card" id="loginCard">
    <h1>Admin Login</h1>
    <p>Only your Firebase admin account can open this panel.</p>

    <label for="adminEmail">Email</label>
    <input id="adminEmail" type="email" autocomplete="email" />

    <label for="adminPass">Password</label>
    <input id="adminPass" type="password" autocomplete="current-password" />

    <button id="adminLoginBtn" class="primary">Login</button>
    <div id="loginStatus" class="status" aria-live="polite"></div>
    <a class="small-link" href="index.html">Back to main site</a>
  </section>

  <section class="card hidden" id="panelCard">
    <h1>Admin Panel</h1>
    <p id="adminInfo">Loading admin session...</p>
    <div class="history-wrap">
      <p class="history-title">Website Login History</p>
      <div id="loginHistoryList" class="history-list">
        <div class="history-item"><span>Loading login history...</span></div>
      </div>
    </div>
    <div class="actions">
      <button id="logoutBtn" class="danger">Logout</button>
    </div>
    <a class="small-link" href="index.html">Go to main site</a>
  </section>

  <script type="module" src="admin.js"></script>
</body>
</html>
