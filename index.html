<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pyarghar.me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg1: #4f2d7f;
      --bg2: #c84487;
      --bg3: #f489b6;
      --glass: rgba(255, 255, 255, 0.12);
      --text: #fff8fd;
      --accent: #ff4f95;
      --accent-2: #ff8ec4;
      --shadow: 0 18px 45px rgba(54, 10, 52, 0.35);
      --radius: 18px;
      --transition: 640ms cubic-bezier(0.2, 0.8, 0.2, 1);
      --safe-pad: max(16px, env(safe-area-inset-top));
      --photo-bg: url("6064406445593575386_121.jpg");
      --final-bg: url("component.jpg");
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Poppins", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background-color: #08080c;
      background-image:
        linear-gradient(160deg, rgba(6, 4, 10, 0.72), rgba(8, 6, 14, 0.72)),
        var(--photo-bg);
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    body::before,
    body::after {
      content: none;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition), visibility 0s linear var(--transition);
      padding: clamp(16px, 4vw, 32px);
      z-index: 2;
    }

    .screen:not(.final-screen) {
      background-image:
        linear-gradient(160deg, rgba(6, 4, 10, 0.72), rgba(8, 6, 14, 0.72)),
        var(--photo-bg);
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      transition: opacity var(--transition), visibility 0s;
    }

    .screen:not(.active) * {
      animation-play-state: paused !important;
    }

    body.page-exit-lyrics {
      transition: opacity 260ms ease, filter 260ms ease, transform 260ms ease;
      opacity: 0;
      filter: blur(2px) saturate(0.94);
      transform: scale(0.995);
    }

    .romantic-glass {
      width: min(960px, 96vw);
      border-radius: 0;
      padding: clamp(10px, 3vw, 24px);
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      text-align: center;
      position: relative;
      overflow: visible;
    }

    .romantic-glass::after {
      content: none;
    }

    .screen.active .romantic-glass {
      animation: contentRise 800ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      will-change: transform, opacity;
    }

    .script-title {
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2rem, 6.8vw, 4.4rem);
      line-height: 1.1;
      letter-spacing: 0.3px;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.45), 0 0 36px rgba(255, 84, 153, 0.55);
      margin: 0;
    }

    .screen.active .script-title {
      animation: none;
    }

    .screen.active .script-title,
    .screen.active .main-text,
    .screen.active .button-row,
    .screen.active .final-heart {
      animation: contentRise 900ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .screen.active .main-text {
      animation-delay: 120ms;
    }

    .screen.active .button-row {
      animation-delay: 180ms;
    }

    .main-text {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(1.35rem, 3.2vw, 2.2rem);
      line-height: 1.45;
      text-shadow: 0 4px 16px rgba(48, 8, 45, 0.45);
    }

    .typing-wrap {
      min-height: clamp(140px, 24vh, 220px);
      display: grid;
      place-items: center;
      margin-bottom: 14px;
    }

    .typing-text {
      max-width: 48ch;
    }

    .cursor {
      display: inline-block;
      width: 0.55ch;
      margin-left: 2px;
      animation: blink 0.8s steps(1, end) infinite;
    }

    .countdown {
      margin-top: 8px;
      min-height: 2.2em;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(1.9rem, 7vw, 3.4rem);
      letter-spacing: 3px;
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.45);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 500ms ease, transform 500ms ease;
    }

    .countdown.show {
      opacity: 1;
      transform: translateY(0);
    }

    .button-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: clamp(18px, 4vw, 30px);
      min-height: 72px;
      position: relative;
    }

    .romantic-page-actions {
      margin-top: 24px;
      gap: 12px;
    }

    .romantic-page-actions .btn {
      min-width: 170px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 26px;
      min-width: 132px;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 700;
      font-family: "Poppins", sans-serif;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(48, 8, 45, 0.32);
      transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
      touch-action: manipulation;
      user-select: none;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 15px 26px rgba(48, 8, 45, 0.36);
      filter: brightness(1.06);
      outline: none;
    }

    .btn:active {
      transform: translateY(0) scale(0.985);
    }

    .btn-yes {
      background: linear-gradient(180deg, #ff75b2, #f0267f);
    }

    .btn-no {
      background: linear-gradient(180deg, #f4f0f3, #dfd7de);
      color: #7f4f69;
      position: relative;
      isolation: isolate;
      overflow: visible;
      clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
      transition: opacity 620ms ease-in, filter 620ms ease-in, box-shadow 280ms ease;
    }

    .btn-no:active {
      transform: none;
    }

    .btn-no::before,
    .btn-no::after {
      content: "";
      position: absolute;
      inset: -14px;
      border-radius: 24px;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.5);
    }

    .btn-no .burst-spread {
      position: absolute;
      inset: -170px;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.25);
      background:
        radial-gradient(circle at 35% 35%, rgba(255, 95, 152, 0.56), transparent 42%),
        radial-gradient(circle at 72% 30%, rgba(104, 228, 255, 0.5), transparent 44%),
        radial-gradient(circle at 52% 74%, rgba(255, 214, 102, 0.46), transparent 48%);
      filter: blur(10px) saturate(1.2);
      z-index: -1;
    }

    .btn-no.burst {
      animation: noBurstKick 430ms cubic-bezier(0.2, 0.85, 0.3, 1);
      box-shadow:
        0 0 0 2px rgba(255, 255, 255, 0.4),
        0 0 32px rgba(255, 59, 149, 0.72),
        0 0 54px rgba(68, 210, 255, 0.62),
        0 14px 26px rgba(48, 8, 45, 0.38);
      filter: saturate(1.6) contrast(1.04);
    }

    .btn-no.burst::before {
      background: conic-gradient(
        from 0deg,
        #ff365f,
        #ffbf44,
        #4ad8ff,
        #7b61ff,
        #31d7a0,
        #ff365f
      );
      filter: blur(12px);
      animation: noRingBurst 430ms ease-out forwards;
    }

    .btn-no.burst::after {
      background:
        radial-gradient(circle at 14% 20%, rgba(255, 71, 128, 0.96) 0 3px, transparent 4px),
        radial-gradient(circle at 32% 8%, rgba(255, 200, 88, 0.96) 0 3px, transparent 4px),
        radial-gradient(circle at 52% 18%, rgba(111, 224, 255, 0.96) 0 3px, transparent 4px),
        radial-gradient(circle at 76% 14%, rgba(161, 132, 255, 0.96) 0 3px, transparent 4px),
        radial-gradient(circle at 90% 28%, rgba(75, 255, 190, 0.96) 0 3px, transparent 4px),
        radial-gradient(circle at 12% 56%, rgba(255, 118, 203, 0.96) 0 3px, transparent 4px),
        radial-gradient(circle at 34% 72%, rgba(255, 232, 110, 0.96) 0 3px, transparent 4px),
        radial-gradient(circle at 58% 84%, rgba(117, 232, 255, 0.96) 0 3px, transparent 4px),
        radial-gradient(circle at 82% 74%, rgba(198, 160, 255, 0.96) 0 3px, transparent 4px),
        radial-gradient(circle at 94% 56%, rgba(255, 255, 255, 0.96) 0 2px, transparent 3px);
      animation: noSparkBurst 430ms ease-out forwards;
    }

    .btn-no.burst .burst-spread {
      animation: noColorSpread 430ms cubic-bezier(0.18, 0.8, 0.26, 1) forwards;
    }

    .btn-no.vanish {
      opacity: 0;
      transform: none;
      filter: blur(2px) brightness(1.12);
      pointer-events: none;
    }

    .question-screen {
      padding: clamp(12px, 3vw, 26px);
    }

    .question-screen .romantic-glass {
      width: min(1080px, 96vw);
      min-height: min(68vh, 560px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      overflow: visible;
      padding: clamp(12px, 2vw, 24px);
    }

    .question-screen .romantic-glass::after {
      display: none;
    }

    .question-screen .script-title {
      font-size: clamp(2.2rem, 9vw, 5.2rem) !important;
      margin-bottom: 8px !important;
    }

    .question-screen.active .script-title {
      animation: questionFloat 3.1s ease-in-out infinite;
    }

    .question-screen .button-row {
      width: min(94vw, 980px);
      min-height: 180px;
      margin-top: 4px;
      gap: clamp(18px, 5vw, 44px);
    }

    .question-screen .btn {
      min-width: clamp(140px, 22vw, 220px);
      padding: 14px 28px;
      font-size: clamp(1.05rem, 3.4vw, 1.36rem);
    }

    .question-screen.active .btn-yes {
      animation: yesPulse 1.8s ease-in-out infinite;
    }

    .question-screen.active .btn-no {
      animation: noWiggle 1.2s ease-in-out infinite;
    }

    .question-screen.active .btn-no.burst,
    .question-screen.active .btn-no.vanish {
      animation: none;
    }

    .question-screen .btn-no.moving {
      animation: noWiggle 1.2s ease-in-out infinite, noSpinKick 460ms cubic-bezier(0.18, 0.9, 0.3, 1);
    }

    .btn-audio {
      position: fixed;
      top: calc(var(--safe-pad) + 8px);
      right: 16px;
      z-index: 20;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.38);
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 1.2rem;
      display: grid;
      place-items: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 22px rgba(48, 8, 45, 0.28);
      cursor: pointer;
      opacity: 0;
      visibility: hidden;
      transition: opacity 350ms ease, transform 350ms ease, visibility 0s linear 350ms;
    }

    .btn-audio.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      transition: opacity 350ms ease, transform 350ms ease, visibility 0s;
    }

    .success-message {
      margin-top: 18px;
      max-width: 50ch;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(1.1rem, 3.9vw, 1.55rem);
      line-height: 1.6;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 700ms ease, transform 700ms ease;
      text-shadow: 0 4px 14px rgba(52, 10, 48, 0.35);
    }

    .success-message.show {
      opacity: 1;
      transform: translateY(0);
    }

    .popup {
      position: fixed;
      bottom: calc(22px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(18px);
      width: min(88vw, 420px);
      text-align: center;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 420ms ease, transform 420ms ease, visibility 0s linear 420ms;
      z-index: 30;
    }

    .popup.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
      transition: opacity 420ms ease, transform 420ms ease, visibility 0s;
    }

    .heart-canvas,
    .confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 12;
    }

    .hearts-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .final-screen-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.68) contrast(1.05) saturate(1.06);
      transform: scale(1.02);
      pointer-events: none;
    }

    .final-screen-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(1000px 620px at 18% 18%, rgba(255, 255, 255, 0.12), transparent 60%),
        linear-gradient(180deg, rgba(20, 8, 20, 0.28), rgba(20, 8, 20, 0.5));
    }

    .final-screen .hearts-layer {
      z-index: 2;
    }

    .final-screen {
      background-image:
        linear-gradient(160deg, rgba(10, 10, 16, 0.78), rgba(10, 10, 16, 0.78)),
        var(--final-bg);
      background-position: center center;
      background-size: cover;
      background-repeat: no-repeat;
      overflow: hidden;
      animation: none;
    }

    .final-screen::before,
    .final-screen::after {
      content: none;
    }

    .final-screen .romantic-glass {
      z-index: 3;
    }

    .heart {
      position: absolute;
      bottom: -10vh;
      font-size: clamp(14px, 2.8vw, 24px);
      animation: driftUp linear forwards;
      filter: drop-shadow(0 0 8px rgba(255, 140, 180, 0.4));
      opacity: 0.85;
      user-select: none;
      will-change: transform, opacity;
    }

    .final-heart {
      font-size: clamp(4rem, 20vw, 9rem);
      line-height: 1;
      display: inline-block;
      animation: butterflyFly 4.6s ease-in-out infinite, butterflyFlap 0.9s ease-in-out infinite;
      transform-origin: center center;
      text-shadow: 0 0 24px rgba(145, 205, 255, 0.8), 0 0 60px rgba(255, 110, 200, 0.62);
      margin-bottom: 14px;
    }

    .final-screen .final-action-row {
      justify-content: center;
      width: 100%;
      margin-inline: auto;
      margin-top: auto !important;
      padding-right: 0;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }

    .final-screen .romantic-glass {
      min-height: min(78vh, 660px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .final-screen .final-play-btn {
      min-width: 190px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background:
        linear-gradient(130deg, rgba(255, 72, 165, 0.92), rgba(149, 84, 255, 0.9), rgba(76, 203, 255, 0.9));
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.18) inset,
        0 10px 24px rgba(32, 8, 48, 0.55),
        0 0 26px rgba(255, 84, 180, 0.45);
      letter-spacing: 0.4px;
      transition: transform 220ms ease, box-shadow 220ms ease, filter 220ms ease;
    }

    .final-screen .final-play-btn:hover,
    .final-screen .final-play-btn:focus-visible {
      transform: translateY(-2px) scale(1.04);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.24) inset,
        0 14px 28px rgba(28, 8, 44, 0.62),
        0 0 34px rgba(116, 184, 255, 0.52);
      filter: brightness(1.08) saturate(1.15);
    }

    .final-screen .final-play-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      filter: grayscale(0.1);
    }

    .tiny-note {
      margin-top: 8px;
      opacity: 0.86;
      font-size: 0.9rem;
    }

    .final-play {
      margin-top: 16px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: opacity 360ms ease, transform 360ms ease, visibility 0s linear 360ms;
    }

    .final-play.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      transition: opacity 360ms ease, transform 360ms ease, visibility 0s;
    }

    @keyframes blink {
      0%,
      50% {
        opacity: 1;
      }
      50.01%,
      100% {
        opacity: 0;
      }
    }

    @keyframes driftUp {
      from {
        transform: translate3d(0, 0, 0) scale(0.8) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 0.95;
      }
      to {
        transform: translate3d(var(--drift-x, 0), -120vh, 0) scale(1.14) rotate(14deg);
        opacity: 0;
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes contentRise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes sheenSweep {
      0%,
      12% {
        transform: rotate(16deg) translateX(-180%);
      }
      38%,
      100% {
        transform: rotate(16deg) translateX(360%);
      }
    }

    @keyframes questionFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes yesPulse {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    @keyframes noWiggle {
      0%,
      100% {
        filter: brightness(1);
      }
      30% {
        transform: rotate(-2deg);
      }
      60% {
        transform: rotate(2deg);
      }
    }

    @keyframes noSpinKick {
      0% {
        transform: scale(1) rotate(0deg);
      }
      40% {
        transform: scale(1.12) rotate(-8deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
      }
    }

    @keyframes noBurstKick {
      0% {
        transform: translateY(0);
        filter: saturate(1) hue-rotate(0deg);
      }
      30% {
        transform: translateY(0);
        filter: saturate(1.7) hue-rotate(18deg);
      }
      62% {
        transform: translateY(0);
        filter: saturate(1.8) hue-rotate(-14deg);
      }
      100% {
        transform: translateY(0);
        filter: saturate(1) hue-rotate(0deg);
      }
    }

    @keyframes noRingBurst {
      0% {
        opacity: 0;
        transform: scale(0.45);
      }
      34% {
        opacity: 0.96;
      }
      100% {
        opacity: 0;
        transform: scale(1.8);
      }
    }

    @keyframes noSparkBurst {
      0% {
        opacity: 0;
        transform: scale(0.35);
      }
      40% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: scale(2.1);
      }
    }

    @keyframes noColorSpread {
      0% {
        opacity: 0;
        transform: scale(0.25);
      }
      28% {
        opacity: 0.95;
      }
      100% {
        opacity: 0;
        transform: scale(1.12);
      }
    }

    @keyframes finalNebulaDrift {
      0% {
        transform: translate3d(-2%, 1%, 0) scale(1);
      }
      100% {
        transform: translate3d(2%, -1%, 0) scale(1.06);
      }
    }

    @keyframes finalGrainShift {
      0% {
        transform: translate3d(0, 0, 0);
      }
      100% {
        transform: translate3d(-2.6%, -1.8%, 0);
      }
    }

    @keyframes finalBgPulse {
      0% {
        filter: brightness(0.84) saturate(1.05);
      }
      100% {
        filter: brightness(0.94) saturate(1.2);
      }
    }

    @keyframes butterflyFly {
      0% {
        transform: translate3d(-6px, 0, 0) rotate(-4deg);
      }
      25% {
        transform: translate3d(8px, -10px, 0) rotate(3deg);
      }
      50% {
        transform: translate3d(0, -18px, 0) rotate(-2deg);
      }
      75% {
        transform: translate3d(-10px, -9px, 0) rotate(4deg);
      }
      100% {
        transform: translate3d(-6px, 0, 0) rotate(-4deg);
      }
    }

    @keyframes butterflyFlap {
      0%,
      100% {
        text-shadow: 0 0 22px rgba(145, 205, 255, 0.72), 0 0 56px rgba(255, 110, 200, 0.52);
        filter: saturate(1) brightness(0.98);
      }
      50% {
        text-shadow: 0 0 30px rgba(145, 205, 255, 0.9), 0 0 72px rgba(255, 110, 200, 0.72);
        filter: saturate(1.18) brightness(1.08);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition-duration: 1ms !important;
      }
    }

    @media (max-width: 720px) {
      .final-screen .final-action-row {
        justify-content: center;
        width: 100%;
        padding-right: 0;
      }
    }

    .low-end-device body::after {
      animation: none;
      filter: none;
    }

    .low-end-device .romantic-glass,
    .low-end-device .btn-audio,
    .low-end-device .popup {
      backdrop-filter: none;
    }

    .low-end-device .heart {
      filter: none;
    }

    .auth-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(1100px 620px at 50% 30%, rgba(255, 200, 228, 0.26), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      z-index: 999;
      animation: fadeIn 600ms ease-out;
    }

    .auth-box {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 22px 26px;
      text-align: center;
      backdrop-filter: none;
      box-shadow: none;
      max-width: 460px;
      width: min(92vw, 460px);
      position: relative;
      overflow: visible;
    }

    .auth-box h2 {
      color: #ffe9fb;
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.9rem;
      margin: 0 0 28px 0;
      letter-spacing: 1px;
      font-weight: 700;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255, 78, 166, 0.55);
    }

    .auth-box input {
      width: min(100%, 360px);
      padding: 13px 16px;
      font-size: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;
      background: rgba(15, 4, 26, 0.44);
      color: var(--text);
      margin-bottom: 18px;
      font-family: "Poppins", sans-serif;
      transition: border-color 200ms ease, box-shadow 200ms ease;
      backdrop-filter: blur(8px);
    }

    .auth-box input:focus {
      outline: none;
      border-color: var(--accent-2);
      box-shadow: 0 0 16px rgba(255, 140, 196, 0.4);
      background: rgba(26, 8, 40, 0.58);
    }

    .auth-box input::placeholder {
      color: rgba(255, 248, 253, 0.5);
    }

    .auth-box button {
      width: min(100%, 220px);
      padding: 13px 24px;
      font-size: 1.05rem;
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #ff75b2, #f0267f);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 220ms ease;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 20px rgba(240, 38, 127, 0.3);
      position: relative;
    }

    .auth-box button:hover {
      background: linear-gradient(180deg, #ff8ac4, #e01875);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 12px 28px rgba(240, 38, 127, 0.45);
    }

    .auth-note {
      margin: -12px 0 16px;
      font-size: 0.95rem;
      opacity: 0.95;
      color: #fff1c7;
      letter-spacing: 0.2px;
      text-shadow: 0 0 10px rgba(255, 190, 90, 0.4);
    }

    .auth-butterflies {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .auth-butterfly {
      position: absolute;
      font-size: clamp(1.2rem, 3.2vw, 1.9rem);
      opacity: 0.85;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.38));
      animation: butterflyFloat var(--dur, 9s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .auth-butterfly:nth-child(1) { left: 8%; top: 16%; color: #ffd1ef; }
    .auth-butterfly:nth-child(2) { left: 84%; top: 18%; color: #ffe8a7; }
    .auth-butterfly:nth-child(3) { left: 14%; top: 72%; color: #c6f6ff; }
    .auth-butterfly:nth-child(4) { left: 79%; top: 70%; color: #ffc5d7; }
    .auth-butterfly:nth-child(5) { left: 49%; top: 8%; color: #fff4ca; }
    .auth-butterfly:nth-child(6) { left: 52%; top: 84%; color: #e4d8ff; }

    @keyframes butterflyFloat {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
      }
      25% {
        transform: translate3d(10px, -16px, 0) rotate(7deg) scale(1.06);
      }
      50% {
        transform: translate3d(-8px, -26px, 0) rotate(-5deg) scale(0.95);
      }
      75% {
        transform: translate3d(14px, -12px, 0) rotate(6deg) scale(1.03);
      }
    }

    .auth-box button:active {
      transform: translateY(0);
    }

    .error-msg {
      color: #ffb3c1;
      font-size: 0.9rem;
      margin-top: 14px;
      min-height: 20px;
      font-family: "Poppins", sans-serif;
      text-shadow: 0 2px 8px rgba(48, 8, 45, 0.4);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .welcome-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(150deg, rgba(17, 8, 30, 0.52), rgba(9, 6, 14, 0.7)),
        var(--photo-bg) center center / cover no-repeat;
      z-index: 998;
      animation: fadeIn 600ms ease-out;
    }

    .welcome-box {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 26px 24px;
      text-align: center;
      backdrop-filter: none;
      box-shadow: none;
      max-width: 660px;
      width: min(94vw, 660px);
      animation: welcomeIn 700ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .welcome-text {
      color: var(--text);
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      margin: 0 0 8px 0;
      letter-spacing: 0.5px;
      opacity: 0.9;
      text-shadow: 0 4px 12px rgba(48, 8, 45, 0.35);
    }

    .welcome-name {
      color: var(--text);
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2.2rem, 8vw, 3.6rem);
      margin: 0 0 28px 0;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 16px rgba(255, 84, 153, 0.55), 0 4px 12px rgba(48, 8, 45, 0.35);
      animation: beatName 1.5s ease-in-out infinite;
    }

    .continue-btn {
      background: linear-gradient(180deg, #ff75b2, #f0267f);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px 32px;
      font-size: 1.05rem;
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 220ms ease;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 20px rgba(240, 38, 127, 0.3);
    }

    .continue-btn:hover {
      background: linear-gradient(180deg, #ff8ac4, #e01875);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(240, 38, 127, 0.45);
    }

    .continue-btn:active {
      transform: translateY(0);
    }

    @keyframes welcomeIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes beatName {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    @media (max-width: 480px) {
      .romantic-glass {
        border-radius: 20px;
      }

      .button-row {
        gap: 10px;
      }

      .btn {
        min-width: 122px;
        padding: 11px 18px;
      }

      .question-screen .button-row {
        min-height: 154px;
        gap: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="auth-butterflies" aria-hidden="true">
      <span class="auth-butterfly" style="--dur: 9s; --delay: 0s;">🦋</span>
      <span class="auth-butterfly" style="--dur: 10s; --delay: 1.2s;">🦋</span>
      <span class="auth-butterfly" style="--dur: 8.4s; --delay: 0.7s;">🦋</span>
      <span class="auth-butterfly" style="--dur: 11s; --delay: 2s;">🦋</span>
      <span class="auth-butterfly" style="--dur: 9.8s; --delay: 1.8s;">🦋</span>
      <span class="auth-butterfly" style="--dur: 10.4s; --delay: 0.3s;">🦋</span>
    </div>
    <div class="auth-box">
      <h2>Enter Password</h2>
      <p class="auth-note">This is for special person please verify</p>
      <input type="password" id="passwordInput" placeholder="Enter password" />
      <button id="submitBtn">Verify</button>
      <p id="errorMsg" class="error-msg"></p>
      <p style="margin-top: 10px; margin-bottom: 0; font-size: 0.88rem; opacity: 0.8;">
        Admin? Open <a href="admin.html" style="color: #fff;">admin panel</a>
      </p>
    </div>
  </div>

  <div id="welcomeScreen" class="welcome-screen" style="display: none;">
    <div class="welcome-box">
      <!-- <p class="welcome-text">This is for you</p> -->
      <p class="welcome-text">Miss you..</p>
      <p class="welcome-name">Banu ✨</p>
      <button id="continueBtn" class="continue-btn">Continue</button>
    </div>
  </div>

  <div id="mainContent" class="main-content" style="display: none;">
    <canvas class="confetti-canvas" id="confettiCanvas"></canvas>
    <canvas class="heart-canvas" id="heartCanvas"></canvas>

    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module" src="index-auth.js"></script>

  <script type="text/babel" src="app.js"></script>
</body>
</html>
